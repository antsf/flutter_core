name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests (with coverage)
        run: flutter test --coverage --timeout 60s

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            awk -F: '
              /^LF:/ { lf += $2 }
              /^LH:/ { lh += $2 }
              END {
                pct = (lf > 0) ? (lh / lf) * 100 : 0
                printf "Line coverage: %.1f%% (%d/%d lines)\n", pct, lh, lf
                if (ENVIRON["GITHUB_STEP_SUMMARY"] != "")
                  printf "### Coverage: %.1f%% (%d/%d lines)\n", pct, lh, lf \
                    >> ENVIRON["GITHUB_STEP_SUMMARY"]
              }' coverage/lcov.info
          else
            echo "coverage/lcov.info not found"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

      - name: Publish dry-run
        run: dart pub publish --dry-run
